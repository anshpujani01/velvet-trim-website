<!DOCTYPE html>
<html>
<head>
<title>Admin Panel | The Velvet Trim</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:400px;
margin:auto;
background:white;
padding:20px;
margin-top:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:6px 12px;
margin:5px;
border:none;
cursor:pointer;
}

.approve{
background:green;
color:white;
}

.reject{
background:red;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>Appointment Requests</h2>

<div id="appointments"></div>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBYe05TmBzh1-f3arisvhpSk5fG9xY8_4A",
authDomain: "https://velvettrim-6da3a.firebaseapp.com",
projectId: "velvettrim-6da3a"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


// LOAD APPOINTMENTS
function loadAppointments(){

let container=document.getElementById("appointments");

container.innerHTML="";

db.collection("appointments").get()
.then((querySnapshot)=>{

querySnapshot.forEach((doc)=>{

let data=doc.data();

container.innerHTML+=`

<div>

<strong>${data.name}</strong><br>
${data.service}<br>
${data.date} ${data.time}<br>

Status: ${data.status}<br>

<button class="approve" onclick="approve('${doc.id}')">Approve</button>

<button class="reject" onclick="reject('${doc.id}')">Reject</button>

<hr>

</div>

`;

});

});

}


// APPROVE
function approve(id){

db.collection("appointments").doc(id).update({

status:"Confirmed"

}).then(()=>{

loadAppointments();

});

}


// REJECT
function reject(id){

db.collection("appointments").doc(id).update({

status:"Rejected"

}).then(()=>{

loadAppointments();

});

}


window.onload=loadAppointments;

</script>

</body>
</html>
