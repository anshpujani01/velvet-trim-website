<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velvet Trim | Payment</title>

<style>

body{

background:#f4f4f4;
    background-image: url("bg.jpg");
    background-size: cover;

}

.payment-container{
background:white;
    background-image: url("bg.jpg");

h1{

.qr{

.qr img{

<body>

<div class="payment-container">

<p id="upi">UPI ID: anshpujani@fam</p>
<a href="upi://pay?pa=anshpujani@fam&pn=VelvetTrim&am">

</a>

<script>

function confirmPayment(){

alert("If your Payment is done! Your appointment will be confirmed shortly.");

}

</script>
