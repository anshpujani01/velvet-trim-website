<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Velvet Trim | Book Appointment</title>
<link rel="stylesheet" href="appointment.css">
</head>

<body>

<div class="booking-container">

<h1>Book Your Appointment</h1>
<p>The Velvet Trim Salon</p>

<form id="bookingForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<select id="service" required>
<option value="">Select Service</option>
<option>Haircut (50₹)</option>
<option>Haircut + Beard (70₹)</option>
<option>Hair Styling (30₹)</option>
<option>Beard Trim (30₹)</option>
<option>Head Massage (50₹)</option>
<option>Head Wash (50₹)</option>
</select>

<input type="date" id="date" required>

<input type="time" id="time" required>

<label>Select Payment Method</label>

<select id="paymentMethod" required>
<option value="">Choose Payment</option>
<option value="online">Online Payment</option>
<option value="cash">Cash at Salon</option>
</select>

<button type="submit">Book Appointment</button>

</form>

<!-- Pay Now Button -->
<div id="paymentSection" style="display:none; margin-top:20px;">
<button onclick="goToPayment()">Pay Now</button>
</div>

<p id="message"></p>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBYe05TmBzh1-f3arisvhpSk5fG9xY8_4A",
  authDomain: "velvettrim-6da3a.firebaseapp.com",
  projectId: "velvettrim-6da3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("bookingForm").addEventListener("submit", async function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let service = document.getElementById("service").value;
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;
let paymentMethod = document.getElementById("paymentMethod").value;

await addDoc(collection(db,"appointments"),{
name:name,
phone:phone,
service:service,
date:date,
time:time,
payment:paymentMethod,
status:"pending"
});

let message = `New Appointment Booking

Name: ${name}
Phone: ${phone}
Service: ${service}
Date: ${date}
Time: ${time}
Payment: ${paymentMethod}`;

let whatsappURL = "https://wa.me/919485877545?text=" + encodeURIComponent(message);

window.open(whatsappURL,"_blank");

alert("Appointment Sent!");

if(paymentMethod === "online"){
document.getElementById("paymentSection").style.display = "block";
}

});

</script>

<script>
function goToPayment(){
window.location.href = "payment.html";
}
</script>

</body>
</html>
